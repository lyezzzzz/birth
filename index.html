<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给雯的生日惊喜 🎀</title>
    <style>
        :root {
            --bg-color: #fff9fb;
            --main-pink: #ffb7c5;
            --soft-yellow: #ffedbc;
            --text-color: #7d5a5a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* 🌸 背景装饰：漂浮的表情包 🌸 */
        .float-emoji {
            position: absolute;
            font-size: 24px;
            user-select: none;
            z-index: 1;
            animation: floatUp 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* 可爱卡片 */
        .card {
            width: 82%;
            max-width: 320px;
            background: white;
            padding: 40px 20px;
            border-radius: 40px; /* 超圆润边角 */
            box-shadow: 0 10px 25px rgba(255, 183, 197, 0.3);
            text-align: center;
            z-index: 10;
            border: 4px solid var(--soft-yellow);
            position: relative;
        }

        /* 卡片上的小装饰 */
        .card::before {
            content: '☁️';
            position: absolute;
            top: -25px;
            left: 20px;
            font-size: 40px;
        }

        /* 🎂 摇晃的小蛋糕 */
        。cake {
            font-size: 80px;
            cursor: pointer;
            display: inline-block;
            animation: wiggle 2s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        h1 {
            font-size: 1.6rem;
            color: var(--main-pink);
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .name-tag {
            background: var(--soft-yellow);
            padding: 2px 10px;
            border-radius: 10px;
            color: #d48a8a;
        }

        #message {
            line-height: 1.8;
            font-size: 1rem;
            margin-top: 20px;
            min-height: 100px;
            font-weight: 500;
        }

        .btn {
            background: var(--main-pink);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            margin-top: 25px;
            font-size: 0.9rem;
            box-shadow: 0 4px 0px #e6a1af; /* 扁平化可爱风阴影 */
            transition: all 0.2s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #e6a1af;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="emoji-container"></div>

    <div class="card">
        <div id="start-screen">
            <div class="cake" onclick="start()">🎂</div>
            <p style="margin-top:20px; color:#aaa;">点点小蛋糕<br>看看维雯的生日惊喜</p>
        </div>

        <div id="content" class="hidden">
            <h1><span class="name-tag">许维雯</span><br>生日快乐呀！🌸</h1>
            <div id="message"></div>
            <button class="btn" onclick="location.reload()">再亲一下按钮</button>
        </div>
    </div>

    <script>
        // 生成可爱漂浮物
        const emojis = ['🎈', '🍬', '✨', '☁️', '🍓', '🎀', '🧸'];
        function createEmojis() {
            const container = document.getElementById('emoji-container');
            setInterval(() => {
                const emoji = document.createElement('div');
                emoji.className = 'float-emoji';
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji。style.left = Math.random() * 100 + 'vw';
                emoji。style.animationDuration = (Math.random() * 3 + 4) + 's';
                container.appendChild(emoji);
                
                setTimeout(() => emoji.remove(), 6000);
            }, 500);
        }

        const text = "嘿，可爱的雯：\n祝你生日快乐呀！愿你每天都像草莓一样甜，像云朵一样轻盈。不管几岁，都要保持好奇心和奇奇怪怪的可爱！新的一年，愿你被所有的温柔包围，好运连连～永远18岁~🍓✨";
        let index = 0;

        function typeWriter() {
            if (index < text.length) {
                const msgEl = document.getElementById("message");
                const char = text.charAt(index);
                msgEl.innerHTML += char === '\n' ? '<br>' : char;
                index++;
                setTimeout(typeWriter, 150);
            }
        }

        function start() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            createEmojis();
            typeWriter();
        }
    </script>
</body>
</html>
