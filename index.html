<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给雯的生日惊喜 🎀</title>
    <style>
        :root {
            --bg-color: #fff9fb;
            --main-pink: #ffb7c5;
            --soft-yellow: #ffedbc;
            --text-color: #7d5a5a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            /* 防止手机点击变蓝框 */
            -webkit-tap-highlight-color: transparent;
        }

        /* 背景装饰层级设为 1 */
        #emoji-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; /* 关键：让背景不阻挡点击 */
        }

        .float-emoji {
            position: absolute;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* 卡片层级设为 10 */
        .card {
            width: 82%;
            max-width: 320px;
            background: white;
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(255, 183, 197, 0.3);
            text-align: center;
            z-index: 10;
            border: 4px solid var(--soft-yellow);
            position: relative;
        }

        。card::before {
            content: '☁️';
            position: absolute;
            top: -25px;
            left: 20px;
            font-size: 40px;
        }

        /* 🎂 蛋糕容器：增加点击范围 */
        .cake-wrapper {
            display: inline-block;
            cursor: pointer;
            padding: 20px;
            transition: transform 0.2s;
        }
        
        。cake-wrapper:active {
            transform: scale(0.9);
        }

        .cake {
            font-size: 80px;
            animation: wiggle 2s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        h1 {
            font-size: 1.6rem;
            color: var(--main-pink);
            margin-top: 10px;
        }

        .name-tag {
            background: var(--soft-yellow);
            padding: 2px 10px;
            border-radius: 10px;
            color: #d48a8a;
        }

        #message {
            line-height: 1.8;
            font-size: 1rem;
            margin-top: 20px;
            min-height: 80px;
            white-space: pre-wrap; /* 保留换行 */
        }

        。btn {
            background: var(--main-pink);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            margin-top: 25px;
            font-size: 0.9rem;
            box-shadow: 0 4px 0px #e6a1af;
        }

        。hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="emoji-container"></div>

    <div class="card">
        <div id="start-screen">
            <div class="cake-wrapper" onclick="startCelebration()">
                <div class="cake">🎂</div>
            </div>
            <p style="margin-top:10px; color:#aaa; font-size: 0.9rem;">点点小蛋糕<br>看看维雯的生日惊喜</p>
        </div>

        <div id="content" class="hidden">
            <h1><span class="name-tag">许维雯</span><br>生日快乐呀！🌸</h1>
            <div id="message"></div>
            <button class="btn" onclick="location.reload()">再看一遍</button>
        </div>
    </div>

    <script>
        const emojis = ['🎈', '🍬', '✨', '☁️', '🍓', '🎀', '🧸'];
        function createEmojis() {
            const container = document.getElementById('emoji-container');
            setInterval(() => {
                const emoji = document.createElement('div');
                emoji.className = 'float-emoji';
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 90 + 'vw';
                emoji.style.animationDuration = (Math.random() * 3 + 4) + 's';
                container.appendChild(emoji);
                setTimeout(() => emoji.remove(), 6000);
            }, 6000 / emojis.length);
        }

        const text = "嘿，可爱的维雯：\n祝你生日快乐呀！愿你每天都像草莓一样甜，像云朵一样轻盈。新的一年，愿你被所有的温柔包围，好运连连～永远18岁~🍓✨";
        let index = 0;

        function typeWriter() {
            const msgEl = document.getElementById("message");
            if (index < text.length) {
                const char = text.charAt(index);
                msgEl.innerHTML += char === '\n' ? '<br>' : char;
                index++;
                setTimeout(typeWriter, 120);
            }
        }

        // 核心跳转函数
        function startCelebration() {
            console.log("点击成功！"); // 调试用
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            createEmojis();
            typeWriter();
        }
    </script>
</body>
</html>
