<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给雯的生日惊喜 🎀</title>
    <style>
        :root {
            --main-pink: #ffb7c5;
            --soft-yellow: #ffedbc;
            --text-color: #7d5a5a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #fff9fb;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; -webkit-tap-highlight-color: transparent;
        }

        /* 🌸 背景装饰：设为不可交互，防止阻挡点击 🌸 */
        #emoji-container {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1; pointer-events: none;
        }

        。float-emoji {
            position: absolute; font-size: 24px;
            animation: floatUp 5s linear infinite; opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* 💖 全屏转场心形 💖 */
        #heart-transition {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--main-pink);
            z-index: 999; display: none; opacity: 0;
            transition: opacity 0.5s;
        }

        /* 主卡片：层级必须高于背景 */
        .card {
            width: 85%; max-width: 320px; background: white;
            padding: 40px 20px; border-radius: 40px;
            box-shadow: 0 10px 25px rgba(255, 183, 197, 0.3);
            text-align: center; z-index: 100;
            border: 4px solid var(--soft-yellow);
            position: relative;
        }

        /* 🎂 蛋糕点击区：加大范围 */
        .cake-btn {
            font-size: 80px; cursor: pointer; display: inline-block;
            padding: 20px; animation: wiggle 2s infinite;
            -webkit-user-select: none; touch-action: manipulation;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        h1 { color: var(--main-pink); font-size: 1.5rem; }
        #message { line-height: 1.8; margin: 20px 0; min-height: 60px; font-weight: bold; }

        .macaron-btn {
            background: var(--main-pink); color: white; border: none;
            padding: 12px 30px; border-radius: 50px; font-size: 1rem;
            box-shadow: 0 4px 0 #e6a1af; cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="emoji-container"></div>
    <div id="heart-transition"></div>

    <div class="card">
        <div id="start-page">
            <div class="cake-btn" onclick="go()">🎂</div>
            <p style="color:#aaa;">点点小蛋糕<br>给维雯的惊喜</p>
        </div>

        <div id="end-page" class="hidden">
            <h1>许维雯 生日快乐！🌸</h1>
            <div id="message"></div>
            <button class="macaron-btn" onclick="location.reload()">再来一次</button>
        </div>
    </div>

    <script>
        function go() {
            // 1. 立即触发转场
            const trans = document.getElementById('heart-transition');
            trans.style.display = 'block';
            setTimeout(() => { trans.style.opacity = '1'; }, 10);

            // 2. 0.6秒后切换内容
            setTimeout(() => {
                document.getElementById('start-page').classList.add('hidden');
                document.getElementById('end-page').classList.remove('hidden');
                startText();
                startEmojis();
            }, 600);

            // 3. 1.2秒后移除转场层
            setTimeout(() => {
                trans.style.opacity = '0';
                setTimeout(() => { trans.style.display = 'none'; }, 500);
            }, 1200);
        }

        const msg = "嘿，可爱的维雯：\n祝你生日快乐呀！愿你每天都像草莓一样甜，像云朵一样轻盈。新的一年，愿你被所有的温柔包围，好运连连～永远18岁~🍓✨";
        let i = 0;
        function startText() {
            if (i < msg.length) {
                document.getElementById("message").innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                i++;
                setTimeout(startText, 100);
            }
        }

        function startEmojis() {
            const container = document.getElementById('emoji-container');
            const icons = ['🎈', '🍬', '🍓', '🎀', '🧸'];
            setInterval(() => {
                const e = document.createElement('div');
                e.className = 'float-emoji';
                e.innerText = icons[Math.floor(Math.random() * icons.length)];
                e.style.left = Math.random() * 90 + 'vw';
                container.appendChild(e);
                setTimeout(() => e.remove(), 5000);
            }, 400);
        }
    </script>
</body>
</html>
